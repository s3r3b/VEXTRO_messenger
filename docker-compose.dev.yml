version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/base:bookworm
    command: sleep infinity
    volumes:
      - .:/workspace:cached
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/vextro_db
    depends_on:
      - db
    networks:
      - vextro-net
    # USUNIĘTO: user: node — ten użytkownik nie istnieje w tym obrazie.
    # Domyślny user w mcr.microsoft.com/devcontainers/base:bookworm to "vscode"

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vextro_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - vextro-net

volumes:
  postgres_data_dev:

networks:
  vextro-net:
    driver: bridge